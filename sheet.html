  <style>
    /* ── Body offset for fixed top bar ── */
    body {
      padding-top: 48px;
      padding-bottom: 60px;
    }

    /* ── Top Bar ── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48px;
      background: linear-gradient(160deg, var(--header-bg-1), var(--header-bg-2));
      border-bottom: 1px solid rgba(var(--border-rgb), 0.4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      gap: 12px;
    }

    .top-bar-center {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .back-link {
      font-family: var(--font-heading);
      font-size: 0.58rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--border-light);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      transition: color var(--transition-fast), border-color var(--transition-fast);
      white-space: nowrap;
    }
    .back-link:hover {
      color: var(--gold-light);
      border-color: var(--gold);
      text-decoration: none;
    }

    /* ── Character Header (dark band, page-flow) ── */
    .char-header {
      background: linear-gradient(160deg, var(--header-bg-1), var(--header-bg-2));
      border-bottom: 1px solid rgba(var(--border-rgb), 0.3);
      padding: 16px 24px;
    }

    .char-header-inner {
      max-width: 700px;
      margin: 0 auto;
    }

    .char-name-display {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 900;
      color: var(--gold-light);
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .char-meta-row {
      display: flex;
      align-items: stretch;
    }

    .char-meta-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 10px;
      position: relative;
      min-width: 0;
    }
    .char-meta-item:first-child { padding-left: 0; }
    .char-meta-item:last-child  { padding-right: 0; }

    .char-meta-item + .char-meta-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 15%;
      bottom: 15%;
      width: 1px;
      background: rgba(var(--border-rgb), 0.4);
    }

    .char-meta-label {
      font-family: var(--font-heading);
      font-size: 0.45rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--border-light);
      margin-bottom: 3px;
      white-space: nowrap;
    }

    .char-meta-value {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: rgba(var(--light-text-rgb), 0.9);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    /* ── Sheet Outer ── */
    .sheet-outer {
      padding: 16px 12px;
    }

    /* ── Sheet Body (parchment card) ── */
    .sheet-body {
      max-width: 700px;
      margin: 0 auto;
      background: var(--sheet-bg);
      border: 1px solid var(--border);
      box-shadow: 0 0 0 2px var(--shadow-deep), 0 8px 30px rgba(0,0,0,0.6);
      padding: 20px 24px;
      animation: fadeIn 0.3s ease;
    }

    /* ── Ability Score Grid ── */
    .ability-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
    }

    .ability-box {
      background: var(--ability-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 8px;
      text-align: center;
    }

    .ability-name {
      font-family: var(--font-heading);
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--border-light);
      display: block;
      margin-bottom: 4px;
    }

    .ability-mod {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--stat-color);
      display: block;
      line-height: 1;
      margin-bottom: 3px;
    }

    .ability-score {
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--ink-light);
      display: block;
    }

    /* ── Combat Stats Grid ── */
    .combat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .combat-box {
      background: var(--ability-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 8px 6px;
      text-align: center;
    }

    .combat-label {
      font-family: var(--font-heading);
      font-size: 0.48rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--border-light);
      display: block;
      margin-bottom: 4px;
    }

    .combat-value {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--stat-color);
      display: block;
      line-height: 1;
    }

    /* ── Responsive ── */
    @media (max-width: 500px) {
      .ability-grid {
        grid-template-columns: repeat(3, 1fr);
      }
      .combat-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .char-name-display {
        font-size: 1.3rem;
      }
      .top-bar-right .btn {
        font-size: 0.5rem;
        padding: 5px 8px;
      }
      .char-meta-row {
        flex-wrap: wrap;
        gap: 6px 0;
      }
      .char-meta-item {
        flex: 0 0 33.333%;
      }
      .char-meta-item + .char-meta-item::before {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div id="session-banner" class="session-banner">

  <!-- ── Top Bar (fixed) ── -->

  <!-- ── Sheet Content ── -->
  <div class="sheet-outer">

      <!-- Ability Scores -->
      <div class="sec">Ability Scores</div>
      <div class="ability-grid">
        <div class="ability-box">
          <span class="ability-name">STR</span>
          <span class="ability-mod">+0</span>

        </div>
        <div class="ability-box">
          <span class="ability-name">DEX</span>
          <span class="ability-mod">+0</span>
          <span class="ability-score">(10)</span>
        </div>
        <div class="ability-box">
          <span class="ability-name">CON</span>
          <span class="ability-mod">+0</span>
          <span class="ability-score">(10)</span>
        </div>
        <div class="ability-box">
          <span class="ability-name">INT</span>
          <span class="ability-mod">+0</span>
          <span class="ability-score">(10)</span>
        </div>
        <div class="ability-box">
          <span class="ability-name">WIS</span>
          <span class="ability-mod">+0</span>
          <span class="ability-score">(10)</span>
        </div>
        <div class="ability-box">
          <span class="ability-name">CHA</span>
          <span class="ability-mod">+0</span>

        </div>
      </div>

      <!-- Combat Stats -->
      <div class="sec">Combat</div>
      <div class="combat-grid">
        <div class="combat-box">
          <span class="combat-label">Armor Class</span>
          <span class="combat-value">10</span>
        </div>
        <div class="combat-box">
          <span class="combat-label">Initiative</span>
          <span class="combat-value">+0</span>
        </div>
        <div class="combat-box">

        </div>
        <div class="combat-box">
          <span class="combat-label">Prof Bonus</span>
          <span class="combat-value">+2</span>
        </div>
      </div>

    </div>
  </div>

</body>
