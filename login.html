<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">

  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }

    .login-title {
      font-family: var(--font-heading);
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--gold-light);
      text-align: center;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .login-sub {
      font-family: var(--font-heading);
      font-size: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--border-light);
      text-align: center;
      margin-bottom: 0;
    }

    .tab-bar {
      display: flex;
      width: 100%;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(var(--border-rgb), 0.3);
    }

    .tab-btn {
      font-family: var(--font-heading);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 8px 0;
      width: 50%;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--border-light);
      cursor: pointer;
      transition: all var(--transition-fast);
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--gold-light); }
    .tab-btn.active { color: var(--gold-light); border-bottom-color: var(--gold); }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .submit-btn {
      width: 100%;
      justify-content: center;
      margin-top: 4px;
    }

    .forgot-link {
      display: block;
      text-align: right;
      font-family: var(--font-heading);
      font-size: 0.52rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--border-light);
      margin-top: 6px;
      cursor: pointer;
      transition: color var(--transition-fast);
      background: none;
      border: none;
      padding: 0;
    }
    .forgot-link:hover { color: var(--gold-light); }

    .success-box {
      text-align: center;
      padding: 20px 0 8px;
    }
    .success-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    .success-msg {
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--border-light);
      line-height: 1.5;
    }

    @media (max-width: 600px) {
      .login-wrap { padding: 16px; }
      .login-title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div id="session-banner" class="session-banner">
    Session expired — <a href="login.html">sign in again</a>
  </div>

  <div class="login-wrap">
    <div class="card-dark">
      <h1 class="login-title">⚔ D&amp;D Tracker</h1>
      <p class="login-sub">Campaign Hub</p>

      <div class="divider"></div>

      <div class="tab-bar" id="tab-bar">
        <button class="tab-btn active" data-tab="signin" onclick="switchTab('signin')">Sign In</button>
        <button class="tab-btn" data-tab="signup" onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- Sign In panel -->
      <div id="panel-signin" class="form-panel active">
        <div class="form-field">
          <label class="form-label" for="signin-email">Email</label>
          <input class="form-input" type="email" id="signin-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-field">
          <label class="form-label" for="signin-password">Password</label>
          <input class="form-input" type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password">
          <button class="forgot-link" onclick="switchTab('forgot')">Forgot password?</button>
        </div>
        <button class="btn btn-primary submit-btn" data-label="Sign In" onclick="signIn()">Sign In</button>
      </div>

      <!-- Sign Up panel -->
      <div id="panel-signup" class="form-panel">
        <div class="form-field">
          <label class="form-label" for="signup-name">Display Name</label>
          <input class="form-input" type="text" id="signup-name" placeholder="Thorin Oakenshield" maxlength="30" autocomplete="nickname">
        </div>
        <div class="form-field">
          <label class="form-label" for="signup-email">Email</label>
          <input class="form-input" type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-field">
          <label class="form-label" for="signup-password">Password</label>
          <input class="form-input" type="password" id="signup-password" placeholder="Min. 6 characters" minlength="6" autocomplete="new-password">
        </div>
        <div class="form-field">
          <label class="form-label" for="signup-confirm">Confirm Password</label>
          <input class="form-input" type="password" id="signup-confirm" placeholder="••••••••" autocomplete="new-password">
        </div>
        <button class="btn btn-primary submit-btn" data-label="Sign Up" onclick="signUp()">Sign Up</button>
      </div>

      <!-- Forgot Password panel -->
      <div id="panel-forgot" class="form-panel">
        <div id="forgot-form">
          <div class="form-field">
            <label class="form-label" for="forgot-email">Your Email</label>
            <input class="form-input" type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email">
          </div>
          <button class="btn btn-primary submit-btn" data-label="Send Recovery Email" onclick="sendRecovery()">Send Recovery Email</button>
          <button class="forgot-link" style="text-align:center;width:100%;margin-top:12px;" onclick="switchTab('signin')">← Back to Sign In</button>
        </div>
        <div id="forgot-success" class="success-box" style="display:none;">
          <div class="success-icon">📬</div>
          <div class="success-msg">Recovery email sent!<br>Check your inbox and follow the link to reset your password.</div>
          <button class="forgot-link" style="text-align:center;width:100%;margin-top:16px;" onclick="switchTab('signin')">← Back to Sign In</button>
        </div>
      </div>

      <!-- Error message -->
      <div id="error-msg" style="display:none; margin-top:12px;
        background: rgba(122,21,21,0.15); border: 1px solid var(--red);
        border-radius: 2px; color: var(--red); padding: 10px 12px;
        font-family: var(--font-body); font-size: 0.85rem;">
      </div>
    </div>
  </div>

  <script>
    // Redirect if already signed in
    (async () => {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) window.location.href = 'home.html';
    })();

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN') window.location.href = 'home.html';
    });

    function switchTab(tab) {
      const tabBar = document.getElementById('tab-bar');
      // Hide tab bar on forgot panel, show on others
      tabBar.style.display = tab === 'forgot' ? 'none' : 'flex';

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.tab === tab);
      });
      document.querySelectorAll('.form-panel').forEach(panel => {
        panel.classList.toggle('active', panel.id === 'panel-' + tab);
      });

      // Reset forgot panel state
      if (tab === 'forgot') {
        document.getElementById('forgot-form').style.display = 'block';
        document.getElementById('forgot-success').style.display = 'none';
        document.getElementById('forgot-email').value = '';
      }

      document.getElementById('error-msg').style.display = 'none';
    }

    async function signIn() {
      const email    = document.getElementById('signin-email').value.trim();
      const password = document.getElementById('signin-password').value;

      if (!email || !password) { showError('Please fill in all fields.'); return; }

      setLoading(true);

      const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) { showError(error.message); setLoading(false); return; }

      window.location.href = 'home.html';
    }

    async function signUp() {
      const displayName = document.getElementById('signup-name').value.trim();
      const email       = document.getElementById('signup-email').value.trim();
      const password    = document.getElementById('signup-password').value;
      const confirm     = document.getElementById('signup-confirm').value;

      if (!displayName || !email || !password || !confirm) {
        showError('Please fill in all fields.'); return;
      }
      if (displayName.length < 2) {
        showError('Display name must be at least 2 characters.'); return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.'); return;
      }
      if (password !== confirm) {
        showError('Passwords do not match.'); return;
      }

      setLoading(true);

      const { data: authData, error: authError } = await supabaseClient.auth.signUp({
        email,
        password,
        options: { data: { display_name: displayName } }
      });

      if (authError) { showError(authError.message); setLoading(false); return; }

      if (authData?.user) {
        const { error: profileErr } = await supabaseClient
          .from('profiles')
          .insert({
            id: authData.user.id,
            display_name: displayName
          });
        if (profileErr) {
          console.error('[signUp] Failed to create profile:', profileErr.message);
          // Don't block the user — profile repair on next load will fix it
        }
      }

      window.location.href = 'home.html';
    }

    async function sendRecovery() {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email) { showError('Please enter your email address.'); return; }

      setLoading(true);

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: 'https://christian0765.github.io/dnd-v2/login.html'
      });

      setLoading(false);

      if (error) { showError(error.message); return; }

      document.getElementById('forgot-form').style.display = 'none';
      document.getElementById('forgot-success').style.display = 'block';
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function setLoading(loading) {
      const btns = document.querySelectorAll('.submit-btn');
      btns.forEach(btn => {
        btn.disabled = loading;
        btn.textContent = loading ? 'Please wait…' : btn.dataset.label;
      });
    }

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const activePanel = document.querySelector('.form-panel.active');
      if (!activePanel) return;
      if (activePanel.id === 'panel-signin') signIn();
      else if (activePanel.id === 'panel-signup') signUp();
      else if (activePanel.id === 'panel-forgot') sendRecovery();
    });
  </script>
</body>
</html>
